
name: Crawler NSYSU Bus
on:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '*/5 * * * *'
  push:
  workflow_dispatch:
jobs:
  curl:
    name: Crawler and Publish
    runs-on: ubuntu-latest
    steps:
    - name: Set checkout
      uses: actions/checkout@v2
    - name: mkdir dir
      run: mkdir build
    - run: export time=$(($(date +%s%N)/1000))
    - name: Instal CURL
      run: sudo apt install -y curl
    - name: Use curl download SC zh
      continue-on-error: true
      run: curl -f https://ibus.nsysu.edu.tw/API/RoutePath.aspx\?$time\&T=SC -o tmp_zh.json
    - name: Use curl download SC en
      continue-on-error: true
      run: curl -f 'https://ibus.nsysu.edu.tw/API/RoutePath.aspx?&C=en&T=SC' -o tmp_en.json
    - name: Use curl download CT zh
      continue-on-error: true
      run: curl -f https://ibus.nsysu.edu.tw/API/RoutePath.aspx\?$time\&T=CT -o bus_zh.json
    - name: Use curl download CT en
      continue-on-error: true
      run: curl -f 'https://ibus.nsysu.edu.tw/API/RoutePath.aspx?&C=en&T=CT' -o bus_en.json
    - run: rm -f bus_info_data_zh.json
    - run: rm -f bus_info_data_en.json
    - name: Use JD
      uses: r26d/jq-action@master
      with:
        cmd: jq -n env
    - name: merge zh json
      continue-on-error: true
      run: jq -s '.[0] + .[1]' bus_zh.json tmp_zh.json > build/bus_info_data_zh.json
    - name: merge en json
      continue-on-error: true
      run: jq -s '.[0] + .[1]' bus_en.json tmp_en.json > build/bus_info_data_en.json
    - name: Fallback to previous gh-pages data if API failed
      run: |
        if [ ! -s build/bus_info_data_zh.json ]; then
          echo "API data empty or missing. Fetching previous data from gh-pages..."
          curl -sL https://raw.githubusercontent.com/nsysu-code-club/nsysu-bus/gh-pages/bus_info_data_zh.json -o build/bus_info_data_zh.json || true
        fi
        if [ ! -s build/bus_info_data_en.json ]; then
          echo "API data empty or missing. Fetching previous data from gh-pages..."
          curl -sL https://raw.githubusercontent.com/nsysu-code-club/nsysu-bus/gh-pages/bus_info_data_en.json -o build/bus_info_data_en.json || true
        fi
    - name: Copy static files
      run: |
        cp bus_list_zh.json build/bus_list_zh.json
        cp bus_list_en.json build/bus_list_en.json
    - name: Deploy
      run: |
        cd build
        git init
        git config user.name  "CI"
        git config user.email "flutter-ci@github.com"
        git remote add secure-origin https://${{ secrets.ACCESS_TOKEN }}@github.com/nsysu-code-club/nsysu-bus.git
        git checkout -b gh-pages
        git add .
        git commit -m "Updated site"
        git push --force secure-origin gh-pages
